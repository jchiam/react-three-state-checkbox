name: Check PR
on:
  push:
    branches: [master]
  pull_request:
    branches: [master]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  build:
    name: Build and Lint
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v6
    - uses: actions/setup-node@v6
      with:
        node-version: '24.x'
        cache: 'npm'
    - name: Install Dependencies
      run: npm ci --ignore-scripts
    - name: Build
      run: npm run build
    - name: Lint
      run: npm run lint

  test:
    name: Test (React ${{ matrix.react }}, Node ${{ matrix.node }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        react: ['18', '19']
        node: ['22', '24']
    steps:
    - uses: actions/checkout@v6
    - uses: actions/setup-node@v6
      with:
        node-version: '${{ matrix.node }}.x'
        cache: 'npm'
    - name: Install Dependencies
      run: npm ci --ignore-scripts
    - name: Install Playwright Browsers
      run: npx playwright install --with-deps chromium
    - name: Override React 18
      if: matrix.react == '18'
      run: npm install --no-save --legacy-peer-deps react@18 react-dom@18
    - name: Test
      run: npm test
    - name: Post Coverage
      if: matrix.react == '19' && matrix.node == '24'
      uses: codecov/codecov-action@v6
      with:
        token: ${{ secrets.CODECOV_TOKEN }}
        files: coverage/lcov.info

  security:
    name: Security
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v6
    - uses: actions/setup-node@v6
      with:
        node-version: '24.x'
        cache: 'npm'
    - name: NPM Audit
      run: npm audit
